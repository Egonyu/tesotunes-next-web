name: Playwright Artist Images

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [staging]

jobs:
  playwright-artist-images:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-playwright-nextauth-secret
      AUTH_TRUST_HOST: "true"
      # When a staging API is available, change these to point at it so CI never
      # touches the production database.
      NEXT_PUBLIC_API_URL: https://api.tesotunes.com/api
      API_URL: https://api.tesotunes.com/api
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start -- -p 3000 &

      - name: Wait for app
        run: npx wait-on http://127.0.0.1:3000 --timeout 60000

      # ── Auth setup ────────────────────────────────────────────────────────
      # Runs auth.setup.ts once and saves the session to .playwright/auth/admin.json.
      # All subsequent Playwright projects reuse that saved session, so the login
      # endpoint is only called ONE time per CI run — no more rate-limit 429s.
      - name: Authenticate (setup project)
        env:
          BASE_URL: http://127.0.0.1:3000
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          npx playwright test --project=setup --workers=1
        # If credentials are not set the setup project will throw a clear error.
        # We surface it here rather than silently skipping so broken secrets are
        # caught immediately.

      # ── Artist image E2E ──────────────────────────────────────────────────
      # Reuses the saved auth state — no login call, no rate-limit exposure.
      - name: Run artist image E2E
        env:
          BASE_URL: http://127.0.0.1:3000
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          npx playwright test e2e/admin-artist-image-update.spec.ts \
            --project=chromium \
            --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-artist-images
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
