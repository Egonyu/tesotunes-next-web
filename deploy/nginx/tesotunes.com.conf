# =============================================================================
# Nginx: tesotunes.com / www.tesotunes.com → Next.js (Docker port 3000)
# =============================================================================
# Place at: /etc/nginx/sites-available/tesotunes.com
# Symlink:  ln -s /etc/nginx/sites-available/tesotunes.com /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d tesotunes.com -d www.tesotunes.com
# =============================================================================

# Redirect www → non-www (or vice versa — adjust as needed)
server {
    listen 80;
    server_name www.tesotunes.com tesotunes.com;
    return 301 https://tesotunes.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tesotunes.com www.tesotunes.com;

    # SSL certificates (certbot will fill these)
    # ssl_certificate /etc/letsencrypt/live/tesotunes.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tesotunes.com/privkey.pem;

    # =========================================================================
    # CRITICAL: Allow large file uploads (audio up to 100MB + cover images)
    # Default is 1M which causes 502/413 on song uploads
    # =========================================================================
    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml;
    gzip_min_length 256;

    # Proxy all traffic to the Next.js Docker container
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for file uploads (audio files can be large)
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_connect_timeout 60;

        # Disable buffering for upload progress support
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Cache Next.js static assets
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/tesotunes.com.access.log;
    error_log /var/log/nginx/tesotunes.com.error.log;
}
